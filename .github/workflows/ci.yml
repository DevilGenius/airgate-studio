name: 持续集成

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: 类型检查、测试与构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 克隆 airgate-sdk（go.work 替换）
        run: git clone --depth 1 https://github.com/DouDOU-start/airgate-sdk.git ../airgate-sdk

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: 构建 @airgate/theme
        run: cd ../airgate-sdk/theme && pnpm install --frozen-lockfile && pnpm run build

      - name: 构建前端
        run: cd web && pnpm install --frozen-lockfile && pnpm run build

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: 运行 CI 检查
        run: make ci
